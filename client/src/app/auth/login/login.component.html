<div class="container">
    <div *ngIf="isError" class="alert alert-danger fade show m-3" role="alert">
        {{ errorResponse }}
    </div>
    <div class="row pt-5">
        <div class="col-md-6 mx-auto">
            <div class="card rounded-0">
                <div class="card-header">
                    <h3 class="mb-0">
                        Login
                    </h3>
                </div>
                <div class="card-body">
                    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                        <div class="form-group mb-4">
                            <label>Email</label>
                            <input type="text" formControlName="email" class="form-control" />
                            <div *ngIf="formControl.email!.invalid && (formControl.email!.dirty || formControl.email!.touched)"
                                class="text-danger">
                                <div *ngIf="formControl.email!.errors!['required']">
                                    Email is required!
                                </div>
                                <div *ngIf="formControl.email!.errors!['email']">
                                    Email is invalid!
                                </div>
                            </div>
                        </div>
                        <div class="form-group mb-4">
                            <label>Password</label>
                            <input type="password" formControlName="password" class="form-control" />
                            <div *ngIf="formControl.password!.invalid && (formControl.password!.dirty || formControl.password!.touched)" class="text-danger">
                                <div *ngIf="formControl.password!.errors!['required']">
                                    Password is required!
                                </div>
                            </div>
                        </div>
                        <button class="btn btn-primary mr-1" [disabled]="loginForm.invalid">Login</button>
                    </form>
                </div>
                <div class="card-footer">
                    Not A Registered User? <a routerLink="/auth/register" routerLinkActive="active">Register</a>
                </div>
            </div>
        </div>
    </div>
</div>
