<div class="container">
    <div *ngIf="isSuccess" class="alert alert-success fade show m-3" role="alert">
        {{ successResponse }}
    </div>
    <div *ngIf="isError" class="alert alert-danger fade show m-3" role="alert">
        {{ errorResponse }}
    </div>
    <div class="card m-3">
        <div class="card-header">
            <h3 class="mb-0 text-center">
                New Claim
            </h3>
        </div>
        <div class="card-body">
            <form [formGroup]="claimCreationForm" (ngSubmit)="onSubmit()">
                <div class="form-group mb-2">
                    <label>Date</label>
                    <input type="date" formControlName="date" class="form-control" />
                    <div *ngIf="formControls.date!.invalid && (formControls.date!.dirty || formControls.date!.touched)" class="text-danger">
                        <div *ngIf="formControls.date!.errors!['required']">
                            Date is required!
                        </div>
                    </div>
                </div>
                <div class="form-group mb-2">
                    <label>Reimbursement Type</label>
                    <select formControlName="type" class="form-select">
                        <option value="">---Select an option---</option>
                        <option value="Medical">Medical</option>
                        <option value="Travel">Travel</option>
                        <option value="Food">Food</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Misc">Misc</option>
                    </select>
                    <div *ngIf="formControls.type!.invalid && (formControls.type!.touched || formControls.type!.dirty)"
                        class="text-danger">
                        <div *ngIf="formControls.type!.errors!['required']">
                            Reimbursement type is required!
                        </div>
                    </div>
                </div>
                <div class="form-group mb-2">
                    <label>Requested Value</label>
                    <input type="text" formControlName="requestedAmt" class="form-control" />
                    <div *ngIf="formControls.requestedAmt!.invalid && (formControls.requestedAmt!.dirty || formControls.requestedAmt!.touched)"
                        class="text-danger">
                        <div *ngIf="formControls.requestedAmt!.errors!['required']">
                            Requested value is required!
                        </div>
                    </div>
                </div>
                <div class="form-group mb-2">
                    <label>Currency</label>
                    <select formControlName="currency" class="form-select">
                        <option value="">---Select an option---</option>
                        <option value="INR">INR</option>
                        <option value="USD">USD</option>
                        <option value="EURO">EURO</option>
                    </select>
                    <div *ngIf="formControls.currency!.invalid && (formControls.currency!.touched || formControls.currency!.dirty)" class="text-danger">
                        <div *ngIf="formControls.currency!.errors!['required']">
                            Currency is required!
                        </div>
                    </div>
                </div>
                <div class="form-group mb-2">
                    <label>Attach Receipt</label>
                    <input type="file" (change)="onFileSelected($event)" class="form-control" />
                </div>
                <div class="text-center">
                    <button class="btn btn-primary me-2" [disabled]="claimCreationForm.invalid">Create</button>
                    <button class="btn btn-secondary" (click)="onCancel()">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</div>
